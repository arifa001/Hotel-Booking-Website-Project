<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Booking System</title>
    <link rel="stylesheet" href="Style.css">
    <link rel="icon" href="HotelIcon.png">
    <script src="Script.js"></script>
</head>
<body>
    <header>
        <h1>🏨 Hotel Booking System</h1>
        <nav>
            <button onclick="showSection('booking')">Booking</button>
            <button onclick="showSection('checkin')">Check-In</button>
            <button onclick="showSection('checkout')">Check-Out</button>
            <button onclick="showSection('payment')">Payment</button>
        </nav>
    </header>

    <main>
        <!-- Booking Section -->
        <section id="booking" class="active">
            <h2>Book a Room</h2>
            <form id="bookingForm">
                <label>Full Name:</label>
                <input type="text" id="bName" required>

                <label>Email:</label>
                <input type="email" id="bEmail" required>

                <label>Room Type:</label>
                <select id="bRoomType" required>
                    <option value="">-- Select Room Type --</option>
                    <option value="Single">Single</option>
                    <option value="Double">Double</option>
                    <option value="Suite">Suite</option>
                </select>

                <label>Check-In Date:</label>
                <input type="date" id="bCheckIn" required>

                <label>Check-Out Date:</label>
                <input type="date" id="bCheckOut" required>

                <button type="submit">Reserve Room</button>
            </form>
            <p id="bookingMessage"></p>
        </section>

        <!-- Check-In Section -->
        <section id="checkin">
            <h2>Check-In</h2>
            <form id="checkinForm">
                <label>Email:</label>
                <input type="email" id="cEmail" required>
                <button type="submit">Check-In</button>
            </form>
            <p id="checkinMessage"></p>
        </section>

        <!-- Check-Out Section -->
        <section id="checkout">
            <h2>Check-Out</h2>
            <form id="checkoutForm">
                <label>Email:</label>
                <input type="email" id="coEmail" required>
                <button type="submit">Check-Out</button>
            </form>
            <p id="checkoutMessage"></p>
        </section>

        <!-- Payment Section -->
        <section id="payment">
            <h2>Payment</h2>
            <form id="paymentForm">
                <label>Email:</label>
                <input type="email" id="pEmail" required>

                <label>Amount:</label>
                <input type="number" id="pAmount" placeholder="Enter amount" required>

                <label>Payment Method:</label>
                <select id="pMethod" required>
                    <option value="">-- Select Method --</option>
                    <option value="Credit Card">Credit Card</option>
                    <option value="Debit Card">Debit Card</option>
                    <option value="Cash">Cash</option>
                </select>

                <button type="submit">Pay Now</button>
            </form>
            <p id="paymentMessage"></p>
        </section>
    </main>

    <footer>
        <p>© 2025 Riphah College of Computing | Human Computer Interaction Lab</p>
    </footer>
</body>
</html>
